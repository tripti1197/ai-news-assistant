<div class="container">

  <h1>AI News Assistant</h1>

  <!-- Input -->
  <textarea
    [(ngModel)]="content"
    placeholder="Paste news content here...">
  </textarea>

  <!-- Button -->
  <button
    (click)="generateInsights()"
    [disabled]="loading || content.length < 20">
    {{ loading ? 'Generating...' : 'Generate AI Insights' }}
  </button>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    <p>⏳ Generating insights...</p>
  </div>

  <!-- Results -->
  <div *ngIf="!loading && summary" class="results">

    <!-- Summary Card -->
    <div class="card">
      <div style="display:flex; justify-content: space-between; align-items:center;">
        <h2>🧠 Summary</h2>
        <!-- <button (click)="copy(summary)">Copy</button> -->
      </div>
      <p>{{ summary }}</p>
    </div>

    <!-- Key Points Card -->
    <div class="card">
      <h2>📌 Key Points</h2>
      <ul>
        <li *ngFor="let point of keyPoints">{{ point }}</li>
      </ul>
    </div>

    <!-- Headlines Card -->
    <div class="card">
      <h2>📰 Headlines</h2>
      <ul>
        <li *ngFor="let h of headlines">{{ h }}</li>
      </ul>
    </div>

  </div>

</div>
